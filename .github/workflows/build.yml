name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix build .#expo-orbit-bin
      - run: nix build .#orbit
      - run: nix build .#orbit-fhs
      - run: nix flake check
