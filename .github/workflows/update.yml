name: Update
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: bash scripts/update.sh
      - uses: peter-evans/create-pull-request@v7
        with:
          title: "orbit: update to latest release"
          commit-message: "orbit: update to latest release"
          branch: auto/orbit-update
          delete-branch: true
